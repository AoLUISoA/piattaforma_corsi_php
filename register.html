<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione</title>
    <!-- Font Inter coerente con il sistema -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- FontAwesome per le icone dei campi, se utilizzate nel login -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-container">
    <div class="auth-header">
      
        <h2>Registrazione</h2>
        <p>Crea il tuo profilo inserendo i dati richiesti.</p>
    </div>

    <form>
        <!-- Campo Username -->
        <div class="input-group">
            <label for="username">
                <i class="far fa-user"></i> Username
            </label>
            <input type="text" id="username" placeholder="Inserisci il tuo username" required>
        </div>

        <!-- Campo Email -->
        <div class="input-group">
            <label for="email">
                <i class="far fa-envelope"></i> Email
            </label>
            <input type="email" id="email" placeholder="Inserisci la tua email" required>
        </div>

        <!-- Campo Password -->
        <div class="input-group">
            <label for="password">
                <i class="fas fa-lock"></i> Password
            </label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <!-- Pulsante di Invio -->
        <button type="submit" class="btn-block">
            Registrati <i class="fas fa-user-plus"></i>
        </button>
    </form>
    
    <div class="auth-footer">
        Hai già un account? <a href="#">Accedi ora</a>
    </div>
</div>

</body>
</html>
