<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piattaforma Corsi Online - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h1 class="text-center">Piattaforma Corsi Online ✎</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Accedi</button>
            <button class="tab-btn" onclick="switchTab('register')">Registrati</button>
        </div>

        <!-- form del login -->
        <div id="loginTab" class="tab-content active">
            <div class="form-group">
                <input type="text" id="loginUsername" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="loginIsDocente">
                <label>Accedi come Docente</label>
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Accedi</button>
            <div id="loginMessage" class="message"></div>
        </div>

        <!-- registrazione form -->
        <div id="registerTab" class="tab-content">
            <div class="form-group">
                <input type="text" id="regUsername" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" placeholder="Password" required>
            </div>
            <div class="form-group">
                <input type="email" id="regEmail" placeholder="Email" required>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="regIsDocente">
                <label>Registrati come Docente</label>
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="handleRegister()">Registrati</button>
            <div id="registerMessage" class="message"></div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const btns = document.querySelectorAll('.tab-btn');
            
            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const email = document.getElementById('regEmail').value;
            const isDocente = document.getElementById('regIsDocente').checked;
            const ruolo = isDocente ? 'docente' : 'studente';
            const messageDiv = document.getElementById('registerMessage');
            
            if (!username || !password || !email) {
                messageDiv.textContent = 'Compila tutti i campi';
                messageDiv.className = 'message error';
                return;
            }
            
            const result = await registerUser(username, password, ruolo, email);
            
            if (result.success) {
                messageDiv.textContent = 'Registrazione completata! Ora puoi accedere.';
                messageDiv.className = 'message success';
                
                setTimeout(() => {
                    switchTab('login');
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regIsDocente').checked = false;
                    messageDiv.className = 'message';
                }, 1500);
            } else {
                messageDiv.textContent = result.error;
                messageDiv.className = 'message error';
            }
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const isDocente = document.getElementById('loginIsDocente').checked;
            const ruoloAtteso = isDocente ? 'docente' : 'studente';
            const messageDiv = document.getElementById('loginMessage');
            
            const result = await loginUser(username, password, ruoloAtteso);
            
            if (result.success) {
                setCurrentUser(result.user);
                
                if (result.user.ruolo === 'docente') {
                    window.location.href = 'home_docente.html';
                } else {
                    window.location.href = 'home_studente.html';
                }
            } else {
                messageDiv.textContent = result.error;
                messageDiv.className = 'message error';
            }
        }
    </script>
</body>
</html>
